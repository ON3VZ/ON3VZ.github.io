<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" width="520" height="240">
  <defs>
    <!-- Body gradient - 3D dark panel effect -->
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e38"/>
      <stop offset="30%" stop-color="#1c1f28"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </linearGradient>
    <!-- Top face highlight -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3e4a"/>
      <stop offset="100%" stop-color="#252830"/>
    </linearGradient>
    <!-- Display screen -->
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001a12"/>
      <stop offset="100%" stop-color="#000d08"/>
    </linearGradient>
    <!-- VFO knob radial -->
    <radialGradient id="vfoKnob" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#5a5e6a"/>
      <stop offset="40%" stop-color="#2c2f3a"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </radialGradient>
    <!-- Small knob -->
    <radialGradient id="smallKnob" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4a4e58"/>
      <stop offset="100%" stop-color="#1a1c24"/>
    </radialGradient>
    <!-- Green glowing button -->
    <radialGradient id="btnGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00aa55" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Amber button -->
    <radialGradient id="btnAmber" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0a500" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c07800" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Speaker grill gradient -->
    <linearGradient id="speakerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#161820"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <!-- Screen glow -->
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Knob glow -->
    <filter id="knobGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Waterfall gradient -->
    <linearGradient id="wfall1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00cc88" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#0088ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#003366" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow base -->
  <rect x="8" y="14" width="504" height="218" rx="14" fill="rgba(0,0,0,0.5)" filter="url(#shadow)"/>

  <!-- Main body -->
  <rect x="6" y="8" width="506" height="220" rx="12" fill="url(#body)"/>
  <!-- Body highlight edge top -->
  <rect x="6" y="8" width="506" height="3" rx="2" fill="rgba(255,255,255,0.08)"/>
  <!-- Body left chamfer highlight -->
  <rect x="6" y="8" width="3" height="220" rx="2" fill="rgba(255,255,255,0.05)"/>
  <!-- Body bottom shadow -->
  <rect x="6" y="225" width="506" height="3" rx="2" fill="rgba(0,0,0,0.4)"/>

  <!-- Front panel bezel area - slightly lighter -->
  <rect x="14" y="16" width="490" height="204" rx="8" fill="rgba(255,255,255,0.02)"/>

  <!-- ═══ MAIN DISPLAY / TOUCHSCREEN ═══ -->
  <!-- Screen bezel/frame -->
  <rect x="18" y="22" width="290" height="170" rx="6" fill="#0a0c12" stroke="rgba(0,255,136,0.25)" stroke-width="1.5"/>
  <!-- Screen surface -->
  <rect x="21" y="25" width="284" height="164" rx="4" fill="url(#screen)"/>

  <!-- Spectrum / waterfall display content -->
  <!-- Frequency bar top -->
  <rect x="21" y="25" width="284" height="28" rx="4" fill="#001a0e"/>
  <!-- Frequency text -->
  <text x="35" y="44" font-family="'Share Tech Mono',monospace" font-size="18" font-weight="700" fill="#00ff88" filter="url(#screenGlow)">14.275.00</text>
  <text x="185" y="44" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(0,255,136,0.55)">MHz</text>
  <text x="220" y="39" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(0,212,255,0.7)">USB</text>
  <text x="248" y="39" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(0,255,136,0.5)">100W</text>
  <!-- Mode / VFO -->
  <text x="35" y="55" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.4)">VFO-A    S 5 6 7 8 9 9+</text>

  <!-- S-meter bar -->
  <rect x="25" y="57" width="158" height="7" rx="2" fill="#001208"/>
  <rect x="25" y="57" width="98" height="7" rx="2" fill="#00cc66" opacity="0.85"/>
  <rect x="25" y="57" width="58" height="7" rx="2" fill="#00ff88" opacity="0.9"/>

  <!-- Spectrum display area -->
  <rect x="21" y="68" width="284" height="60" fill="#000e07"/>
  <!-- Spectrum peaks/signal -->
  <polyline points="21,125 35,122 50,118 65,108 80,100 95,108 110,115 125,110 140,105 155,95 170,88 185,92 200,85 215,90 205,97 195,100 210,103 225,108 240,112 255,118 270,120 285,124 305,128" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8" filter="url(#screenGlow)"/>
  <!-- Fill under spectrum -->
  <polygon points="21,128 35,122 50,118 65,108 80,100 95,108 110,115 125,110 140,105 155,95 170,88 185,92 200,85 215,90 205,97 195,100 210,103 225,108 240,112 255,118 270,120 285,128" fill="url(#wfall1)" opacity="0.3"/>
  <!-- Cursor line -->
  <line x1="170" y1="68" x2="170" y2="128" stroke="rgba(0,255,136,0.6)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Waterfall area -->
  <rect x="21" y="128" width="284" height="55" fill="#00080a"/>
  <!-- Waterfall rows -->
  <rect x="21" y="128" width="284" height="8" fill="rgba(0,120,200,0.12)"/>
  <rect x="21" y="136" width="284" height="8" fill="rgba(0,80,160,0.15)"/>
  <rect x="21" y="144" width="284" height="8" fill="rgba(0,200,120,0.08)"/>
  <rect x="21" y="152" width="284" height="8" fill="rgba(0,160,200,0.1)"/>
  <rect x="21" y="160" width="284" height="8" fill="rgba(0,100,200,0.08)"/>
  <rect x="21" y="168" width="284" height="5" fill="rgba(0,80,120,0.1)"/>
  <!-- Signal hotspots in waterfall -->
  <rect x="160" y="128" width="20" height="45" fill="rgba(0,255,136,0.15)" rx="1"/>
  <rect x="165" y="128" width="10" height="45" fill="rgba(0,255,136,0.2)" rx="1"/>
  <rect x="90" y="136" width="12" height="30" fill="rgba(0,180,255,0.12)" rx="1"/>
  <rect x="220" y="140" width="8" height="25" fill="rgba(0,160,255,0.1)" rx="1"/>

  <!-- Screen border highlight -->
  <rect x="21" y="25" width="284" height="164" rx="4" fill="none" stroke="rgba(0,255,136,0.12)" stroke-width="1"/>

  <!-- ═══ IC-7300 LABEL ═══ -->
  <text x="25" y="206" font-family="'Orbitron',monospace" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="1">IC-7300 MkII</text>
  <text x="25" y="220" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(0,255,136,0.5)" letter-spacing="2">ICOM · SDR · HF/6m · 100W</text>

  <!-- ═══ RIGHT PANEL — VFO + Controls ═══ -->
  <!-- Right panel background -->
  <rect x="318" y="16" width="178" height="204" rx="6" fill="rgba(0,0,0,0.2)"/>

  <!-- VFO A/B switch row -->
  <rect x="326" y="22" width="50" height="16" rx="3" fill="#1c2030" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="351" y="33" font-family="'Share Tech Mono',monospace" font-size="7" fill="#00ff88" text-anchor="middle">VFO A</text>
  <rect x="382" y="22" width="50" height="16" rx="3" fill="#141618" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="407" y="33" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle">VFO B</text>

  <!-- MAIN VFO KNOB - large, detailed -->
  <circle cx="416" cy="108" r="52" fill="rgba(0,0,0,0.5)" filter="url(#shadow)"/>
  <circle cx="416" cy="108" r="48" fill="url(#vfoKnob)"/>
  <!-- Knob ring outer -->
  <circle cx="416" cy="108" r="48" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Knob tick marks -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
    <line x1="416" y1="62" x2="416" y2="70"/>
    <line x1="416" y1="146" x2="416" y2="154"/>
    <line x1="370" y1="108" x2="378" y2="108"/>
    <line x1="454" y1="108" x2="462" y2="108"/>
    <line x1="384" y1="76" x2="390" y2="82"/>
    <line x1="442" y1="76" x2="448" y2="82"/>
    <line x1="384" y1="134" x2="390" y2="140"/>
    <line x1="442" y1="134" x2="448" y2="140"/>
  </g>
  <!-- Knob inner rubber grip ridges -->
  <circle cx="416" cy="108" r="36" fill="#1e2230" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="416" cy="108" r="26" fill="#252835" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Knob indicator line -->
  <line x1="416" y1="84" x2="416" y2="96" stroke="#00ff88" stroke-width="2.5" filter="url(#knobGlow)"/>
  <circle cx="416" cy="83" r="2.5" fill="#00ff88" filter="url(#knobGlow)"/>

  <!-- Small knobs row top -->
  <!-- AF Gain -->
  <circle cx="336" cy="64" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="336" cy="64" r="12" fill="url(#smallKnob)"/>
  <circle cx="336" cy="64" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="336" y1="54" x2="336" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="336" y="84" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">AF</text>

  <!-- RF Gain -->
  <circle cx="368" cy="64" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="368" cy="64" r="12" fill="url(#smallKnob)"/>
  <line x1="368" y1="54" x2="368" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="368" y="84" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">RF</text>

  <!-- Button row 1 -->
  <rect x="326" y="96" width="22" height="10" rx="2" fill="#1a2040" stroke="rgba(0,212,255,0.4)" stroke-width="0.8"/>
  <text x="337" y="104" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,212,255,0.7)" text-anchor="middle">MODE</text>

  <rect x="352" y="96" width="18" height="10" rx="2" fill="#1a2040" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="361" y="104" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,255,136,0.6)" text-anchor="middle">NB</text>

  <!-- Button row 2 -->
  <rect x="326" y="152" width="18" height="10" rx="2" fill="#1a2040" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="335" y="160" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,255,136,0.6)" text-anchor="middle">TUNE</text>

  <rect x="348" y="152" width="18" height="10" rx="2" fill="#401a1a" stroke="rgba(255,68,102,0.5)" stroke-width="0.8"/>
  <text x="357" y="160" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,68,102,0.8)" text-anchor="middle">TX</text>

  <!-- MULTI knob -->
  <circle cx="336" cy="180" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="336" cy="180" r="12" fill="url(#smallKnob)"/>
  <line x1="336" y1="170" x2="336" y2="176" stroke="rgba(240,165,0,0.8)" stroke-width="1.5"/>
  <text x="336" y="200" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">MULTI</text>

  <!-- PWR/ATT knob -->
  <circle cx="368" cy="180" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="368" cy="180" r="12" fill="url(#smallKnob)"/>
  <line x1="368" y1="170" x2="368" y2="176" stroke="rgba(0,212,255,0.7)" stroke-width="1.5"/>
  <text x="368" y="200" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle">PWR</text>

  <!-- USB connector (back panel hint) -->
  <rect x="328" y="114" width="28" height="12" rx="2" fill="#0e1018" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="342" y="123" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.25)" text-anchor="middle">USB</text>

  <!-- POWER LED -->
  <circle cx="476" cy="196" r="5" fill="url(#btnGlow)" filter="url(#knobGlow)"/>
  <circle cx="476" cy="196" r="5" fill="none" stroke="rgba(0,255,136,0.5)" stroke-width="1"/>

  <!-- Power button -->
  <circle cx="492" cy="196" r="9" fill="#1a1c24" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
  <text x="492" y="200" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,255,136,0.8)" text-anchor="middle">⏻</text>

  <!-- ═══ BOTTOM CONNECTORS STRIP ═══ -->
  <rect x="14" y="213" width="490" height="8" rx="0" fill="rgba(0,0,0,0.3)"/>
  <!-- ANT connector -->
  <circle cx="50" cy="217" r="4.5" fill="#2a2c35" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="50" cy="217" r="2" fill="rgba(0,0,0,0.8)"/>
  <text x="50" y="227" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.2)" text-anchor="middle">ANT</text>
  <!-- MIC connector -->
  <rect x="90" y="214" width="16" height="7" rx="2" fill="#1e2030" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="98" y="219" font-family="'Share Tech Mono',monospace" font-size="4.5" fill="rgba(255,255,255,0.25)" text-anchor="middle">MIC</text>
  <!-- PHONES -->
  <circle cx="130" cy="217" r="4" fill="#1e2030" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- HDMI -->
  <rect x="150" y="214" width="20" height="7" rx="1" fill="#1e2030" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="160" y="219" font-family="'Share Tech Mono',monospace" font-size="4.5" fill="rgba(0,212,255,0.5)" text-anchor="middle">HDMI</text>
  <!-- LAN -->
  <rect x="178" y="214" width="18" height="7" rx="1" fill="#1e2030" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
  <text x="187" y="219" font-family="'Share Tech Mono',monospace" font-size="4.5" fill="rgba(0,212,255,0.45)" text-anchor="middle">LAN</text>

  <!-- ICOM logo area bottom right -->
  <text x="485" y="25" font-family="'Orbitron',monospace" font-size="9" fill="rgba(255,255,255,0.15)" text-anchor="end">ICOM</text>
</svg>
