<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <defs>
    <linearGradient id="wire_lb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a5e6a"/>
      <stop offset="50%" stop-color="#8a8e9a"/>
      <stop offset="100%" stop-color="#4a4e5a"/>
    </linearGradient>
    <filter id="glow_lb">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="260" y="18" font-family="'Orbitron',monospace" font-size="9" font-weight="700" fill="rgba(0,255,136,0.65)" text-anchor="middle" letter-spacing="1">LOW-BAND HORIZONTAL</text>
  <text x="260" y="31" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.35)" text-anchor="middle">DEDICATED 80m · 40m · ROOFTOP HORIZONTAL</text>

  <!-- Rooftop ridge line -->
  <line x1="10" y1="120" x2="508" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="14" y="132" font-family="'Share Tech Mono',monospace" font-size="6.5" fill="rgba(255,255,255,0.15)">ROOFTOP</text>

  <!-- Left support mast -->
  <rect x="40" y="80" width="8" height="42" rx="2" fill="#2a2e3a"/>
  <rect x="34" y="118" width="20" height="8" rx="2" fill="#1a1e28"/>
  <!-- Left insulator -->
  <circle cx="44" cy="80" r="6" fill="#1a1e28" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
  <circle cx="44" cy="80" r="3" fill="#0e1018"/>

  <!-- Right support mast -->
  <rect x="472" y="80" width="8" height="42" rx="2" fill="#2a2e3a"/>
  <rect x="466" y="118" width="20" height="8" rx="2" fill="#1a1e28"/>
  <!-- Right insulator -->
  <circle cx="476" cy="80" r="6" fill="#1a1e28" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
  <circle cx="476" cy="80" r="3" fill="#0e1018"/>

  <!-- Main horizontal wire (antenna element) — slight catenary sag -->
  <path d="M44,80 Q260,88 476,80" fill="none" stroke="url(#wire_lb)" stroke-width="4" stroke-linecap="round"/>
  <!-- Wire glow -->
  <path d="M44,80 Q260,88 476,80" fill="none" stroke="rgba(0,255,136,0.15)" stroke-width="8" filter="url(#glow_lb)"/>
  <!-- Wire highlight -->
  <path d="M44,79 Q260,87 476,79" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Feed point center -->
  <circle cx="260" cy="84" r="10" fill="#1a1e28" stroke="rgba(0,255,136,0.6)" stroke-width="2"/>
  <circle cx="260" cy="84" r="5" fill="#0e1018"/>
  <circle cx="260" cy="84" r="2.5" fill="rgba(0,255,136,0.4)"/>
  <!-- Feed line drooping down -->
  <path d="M260,93 Q270,140 280,170" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="288" y="175" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.45)">FEEDLINE</text>
  <text x="270" y="74" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.7)">FEED</text>

  <!-- Wire length annotation -->
  <line x1="44" y1="104" x2="476" y2="104" stroke="rgba(0,255,136,0.2)" stroke-width="1" marker-start="url(#tick)" marker-end="url(#tick)"/>
  <defs>
    <marker id="tick" markerWidth="4" markerHeight="8" refX="2" refY="4" orient="auto">
      <line x1="2" y1="0" x2="2" y2="8" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
    </marker>
  </defs>
  <text x="260" y="116" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.35)" text-anchor="middle">~40m span (½λ on 40m · ¼λ on 80m)</text>

  <!-- Radiation pattern (NVIS + DX lobes horizontal) -->
  <!-- NVIS high-angle lobe -->
  <ellipse cx="260" cy="80" rx="18" ry="55" fill="rgba(0,255,136,0.05)" stroke="rgba(0,255,136,0.12)" stroke-width="1" stroke-dasharray="3,5"/>
  <!-- DX lower lobes, both sides -->
  <ellipse cx="130" cy="78" rx="55" ry="14" fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.08)" stroke-width="1" stroke-dasharray="3,6" transform="rotate(-10 130 78)"/>
  <ellipse cx="390" cy="78" rx="55" ry="14" fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.08)" stroke-width="1" stroke-dasharray="3,6" transform="rotate(10 390 78)"/>

  <!-- Band callouts -->
  <rect x="30" y="145" width="90" height="32" rx="5" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <text x="75" y="160" font-family="'Orbitron',monospace" font-size="9" font-weight="700" fill="rgba(0,255,136,0.7)" text-anchor="middle">80m</text>
  <text x="75" y="172" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.4)" text-anchor="middle">3.5–3.8 MHz</text>

  <rect x="130" y="145" width="90" height="32" rx="5" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="175" y="160" font-family="'Orbitron',monospace" font-size="9" font-weight="700" fill="rgba(0,255,136,0.8)" text-anchor="middle">40m</text>
  <text x="175" y="172" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.5)" text-anchor="middle">7.0–7.2 MHz</text>

  <rect x="300" y="145" width="120" height="32" rx="5" fill="rgba(240,165,0,0.05)" stroke="rgba(240,165,0,0.2)" stroke-width="1"/>
  <text x="360" y="160" font-family="'Share Tech Mono',monospace" font-size="7.5" fill="rgba(240,165,0,0.6)" text-anchor="middle">+ 160m with Class A</text>
  <text x="360" y="172" font-family="'Share Tech Mono',monospace" font-size="6.5" fill="rgba(240,165,0,0.4)" text-anchor="middle">HAREC licence required</text>

  <!-- H-POL indicator -->
  <text x="260" y="200" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">HORIZONTAL POL · LOW-ANGLE DX + NVIS</text>
</svg>
