<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" width="440" height="200">
  <defs>
    <linearGradient id="bodyFTM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24262e"/>
      <stop offset="35%" stop-color="#191b22"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <radialGradient id="vfoFTM" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#585c68"/>
      <stop offset="50%" stop-color="#28293a"/>
      <stop offset="100%" stop-color="#0e0f18"/>
    </radialGradient>
    <linearGradient id="screenFTM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a25"/>
      <stop offset="100%" stop-color="#00080e"/>
    </linearGradient>
    <radialGradient id="knobFTM" cx="35%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#4a4c58"/>
      <stop offset="100%" stop-color="#1a1b24"/>
    </radialGradient>
    <filter id="shadowFTM">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="glowFTM">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="yaesuFTM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055cc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0033aa" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Spectrum gradient for display -->
    <linearGradient id="specFTM" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#003366" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#0066aa" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#00aaff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.9"/>
    </linearGradient>
    <!-- APRS orange gradient -->
    <linearGradient id="aprsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc5500"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="6" y="12" width="428" height="178" rx="12" fill="rgba(0,0,0,0.5)" filter="url(#shadowFTM)"/>

  <!-- Body -->
  <rect x="4" y="8" width="432" height="180" rx="10" fill="url(#bodyFTM)"/>
  <!-- Top highlight -->
  <rect x="4" y="8" width="432" height="2.5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <!-- Left highlight -->
  <rect x="4" y="8" width="2.5" height="180" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Bottom shadow -->
  <rect x="4" y="183" width="432" height="5" rx="3" fill="rgba(0,0,0,0.45)"/>

  <!-- Yaesu blue stripe -->
  <rect x="10" y="8" width="7" height="180" rx="3" fill="url(#yaesuFTM)"/>

  <!-- ═══ MAIN TOUCHSCREEN DISPLAY ═══ -->
  <rect x="22" y="14" width="245" height="148" rx="6" fill="#060810" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <rect x="24" y="16" width="241" height="144" rx="4" fill="url(#screenFTM)"/>

  <!-- Top bar - VFO A (main) -->
  <rect x="24" y="16" width="241" height="38" rx="4" fill="#000e18"/>
  <!-- Main frequency -->
  <text x="30" y="38" font-family="'Share Tech Mono',monospace" font-size="22" font-weight="700" fill="#00d4ff" filter="url(#glowFTM)" letter-spacing="1">144.800</text>
  <text x="198" y="33" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(0,212,255,0.55)">MHz</text>
  <text x="30" y="48" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(0,212,255,0.4)">A  FM  50W  PO↑</text>

  <!-- Divider -->
  <line x1="24" y1="54" x2="265" y2="54" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>

  <!-- Sub VFO B -->
  <rect x="24" y="55" width="241" height="22" rx="0" fill="#000c14"/>
  <text x="30" y="70" font-family="'Share Tech Mono',monospace" font-size="14" fill="rgba(0,212,255,0.45)" letter-spacing="1">430.000</text>
  <text x="175" y="67" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.3)">B FM</text>

  <!-- APRS strip -->
  <rect x="24" y="77" width="241" height="20" rx="0" fill="#080e18"/>
  <rect x="24" y="77" width="4" height="20" fill="url(#aprsGrad)"/>
  <text x="32" y="88" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(240,165,0,0.8)">APRS  ON3KRB-9  ON AIR</text>
  <text x="32" y="95" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(240,165,0,0.4)">50.6N 4.3E  →  ANT  145.825</text>

  <!-- Spectrum area -->
  <rect x="24" y="97" width="241" height="45" fill="#000810"/>
  <!-- Spectrum peaks -->
  <polyline points="24,140 38,138 52,135 66,128 80,122 94,125 108,130 122,125 136,118 150,108 164,98 178,105 192,110 206,106 220,112 234,118 248,124 264,140" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8" filter="url(#glowFTM)"/>
  <polygon points="24,142 38,138 52,135 66,128 80,122 94,125 108,130 122,125 136,118 150,108 164,98 178,105 192,110 206,106 220,112 234,118 248,124 264,142" fill="url(#specFTM)" opacity="0.3"/>
  <!-- Cursor -->
  <line x1="150" y1="97" x2="150" y2="142" stroke="rgba(0,212,255,0.5)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Bottom bar icons -->
  <rect x="24" y="142" width="241" height="18" rx="0" fill="#00080e" rx="3"/>
  <text x="32" y="154" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.4)">C4FM  WIRES  D  SQL</text>

  <!-- Screen border glow -->
  <rect x="24" y="16" width="241" height="144" rx="4" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>

  <!-- ═══ RIGHT PANEL CONTROLS ═══ -->
  <!-- Background panel -->
  <rect x="276" y="14" width="152" height="148" rx="5" fill="rgba(0,0,0,0.15)"/>

  <!-- MAIN VFO knob -->
  <circle cx="355" cy="72" r="40" fill="rgba(0,0,0,0.4)" filter="url(#shadowFTM)"/>
  <circle cx="355" cy="72" r="37" fill="url(#vfoFTM)"/>
  <circle cx="355" cy="72" r="37" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Ticks -->
  <g stroke="rgba(255,255,255,0.22)" stroke-width="1.5">
    <line x1="355" y1="37" x2="355" y2="44"/>
    <line x1="355" y1="100" x2="355" y2="107"/>
    <line x1="320" y1="72" x2="327" y2="72"/>
    <line x1="383" y1="72" x2="390" y2="72"/>
    <line x1="330" y1="47" x2="335" y2="52"/>
    <line x1="375" y1="47" x2="380" y2="52"/>
    <line x1="330" y1="92" x2="335" y2="87"/>
    <line x1="375" y1="92" x2="380" y2="87"/>
  </g>
  <circle cx="355" cy="72" r="27" fill="#1e2030" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="355" cy="72" r="17" fill="#252838"/>
  <line x1="355" y1="48" x2="355" y2="58" stroke="#00d4ff" stroke-width="2.5" filter="url(#glowFTM)"/>
  <circle cx="355" cy="47" r="2.5" fill="#00d4ff" filter="url(#glowFTM)"/>
  <text x="355" y="118" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.3)" text-anchor="middle">VFO</text>

  <!-- Vol/SQL knobs stacked right -->
  <circle cx="416" cy="38" r="14" fill="rgba(0,0,0,0.35)"/>
  <circle cx="416" cy="38" r="12" fill="url(#knobFTM)"/>
  <line x1="416" y1="28" x2="416" y2="33" stroke="rgba(0,212,255,0.5)" stroke-width="1.5"/>
  <text x="416" y="58" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">VOL</text>

  <circle cx="416" cy="82" r="14" fill="rgba(0,0,0,0.35)"/>
  <circle cx="416" cy="82" r="12" fill="url(#knobFTM)"/>
  <line x1="416" y1="72" x2="416" y2="77" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="416" y="102" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">SQL</text>

  <!-- APRS key button -->
  <rect x="282" y="22" width="36" height="14" rx="3" fill="rgba(240,165,0,0.12)" stroke="rgba(240,165,0,0.5)" stroke-width="1"/>
  <text x="300" y="31" font-family="'Share Tech Mono',monospace" font-size="6.5" fill="rgba(240,165,0,0.9)" text-anchor="middle" font-weight="700">APRS</text>

  <!-- Band button -->
  <rect x="322" y="22" width="28" height="14" rx="3" fill="#151820" stroke="rgba(0,212,255,0.3)" stroke-width="0.8"/>
  <text x="336" y="31" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.6)" text-anchor="middle">BAND</text>

  <!-- Bottom small buttons row -->
  <rect x="282" y="120" width="22" height="12" rx="2" fill="#151820" stroke="rgba(0,212,255,0.25)" stroke-width="0.8"/>
  <text x="293" y="129" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,212,255,0.5)" text-anchor="middle">SCAN</text>

  <rect x="308" y="120" width="22" height="12" rx="2" fill="#151820" stroke="rgba(0,255,136,0.25)" stroke-width="0.8"/>
  <text x="319" y="129" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,255,136,0.5)" text-anchor="middle">GM</text>

  <!-- TX/RX LEDs -->
  <circle cx="406" cy="130" r="4" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.35)" stroke-width="1"/>
  <text x="406" y="142" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(0,255,136,0.35)" text-anchor="middle">RX</text>

  <circle cx="422" cy="130" r="4" fill="rgba(255,68,102,0.08)" stroke="rgba(255,68,102,0.2)" stroke-width="1"/>
  <text x="422" y="142" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,68,102,0.3)" text-anchor="middle">TX</text>

  <!-- Power button large -->
  <circle cx="416" cy="152" r="8" fill="#1a1c24" stroke="rgba(0,255,136,0.45)" stroke-width="1.5"/>
  <text x="416" y="156" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,255,136,0.8)" text-anchor="middle">⏻</text>

  <!-- ═══ BOTTOM STRIP ═══ -->
  <rect x="4" y="168" width="432" height="20" rx="6" fill="rgba(0,0,0,0.2)"/>
  <!-- Label -->
  <text x="22" y="182" font-family="'Orbitron',monospace" font-size="11" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="1">FTM-500DE</text>
  <text x="160" y="182" font-family="'Share Tech Mono',monospace" font-size="7.5" fill="rgba(0,212,255,0.4)" letter-spacing="1">YAESU · 50W · 2m/70cm · APRS · C4FM</text>

  <!-- Mic jack bottom -->
  <rect x="22" y="155" width="30" height="10" rx="2" fill="#0e1018" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="37" y="163" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.22)" text-anchor="middle">MIC</text>

  <circle cx="76" cy="160" r="5" fill="#1e2030" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="76" cy="160" r="2" fill="#0a0c10"/>
  <text x="76" y="170" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.2)" text-anchor="middle">ANT</text>

  <!-- Yaesu logo -->
  <text x="430" y="17" font-family="'Orbitron',monospace" font-size="8" fill="rgba(0,212,255,0.18)" text-anchor="end">YAESU</text>
</svg>
