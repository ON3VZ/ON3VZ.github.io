<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <linearGradient id="boom_fx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3e4a"/>
      <stop offset="50%" stop-color="#5a5e6a"/>
      <stop offset="100%" stop-color="#2a2e38"/>
    </linearGradient>
    <linearGradient id="el_fx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a5e6a"/>
      <stop offset="50%" stop-color="#8a8e9a"/>
      <stop offset="100%" stop-color="#4a4e5a"/>
    </linearGradient>
    <filter id="glow_fx">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background info -->
  <text x="260" y="18" font-family="'Orbitron',monospace" font-size="10" font-weight="700" fill="rgba(0,212,255,0.7)" text-anchor="middle" letter-spacing="2">FLEXA FX-210</text>
  <text x="260" y="32" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.4)" text-anchor="middle">6 ELEMENTS · 215 cm BOOM · 11.2 dBi · 144 MHz</text>

  <!-- BOOM horizontal tube -->
  <rect x="30" y="96" width="458" height="8" rx="3" fill="url(#boom_fx)"/>
  <!-- Boom shadow detail -->
  <rect x="30" y="97" width="458" height="2" fill="rgba(0,0,0,0.3)" rx="1"/>
  <rect x="30" y="96" width="458" height="1" fill="rgba(255,255,255,0.12)" rx="1"/>

  <!-- Mount clamp at center -->
  <rect x="247" y="89" width="24" height="22" rx="3" fill="#1a1e28" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <rect x="251" y="93" width="16" height="14" rx="2" fill="#0e1218"/>
  <circle cx="252" cy="95" r="2" fill="#2a2e38" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <circle cx="266" cy="95" r="2" fill="#2a2e38" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

  <!-- Elements — vertical bars, each labeled -->
  <!-- Element 1: Reflector (longest, leftmost) -->
  <rect x="38" y="48" width="7" height="104" rx="2" fill="url(#el_fx)"/>
  <text x="42" y="40" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">REF</text>
  <text x="42" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="middle">104</text>

  <!-- Element 2: Driven (DE) with feed point highlight -->
  <rect x="113" y="52" width="7" height="96" rx="2" fill="url(#el_fx)"/>
  <!-- Feed point glow -->
  <rect x="111" y="93" width="11" height="14" rx="2" fill="#1a2030" stroke="rgba(0,212,255,0.6)" stroke-width="1.5"/>
  <circle cx="116" cy="100" r="3" fill="rgba(0,212,255,0.3)" stroke="#00d4ff" stroke-width="1" filter="url(#glow_fx)"/>
  <text x="117" y="44" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.7)" text-anchor="middle">DE</text>
  <text x="117" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.4)" text-anchor="middle">~97</text>

  <!-- Feed coax line -->
  <line x1="116" y1="107" x2="116" y2="130" stroke="rgba(0,212,255,0.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="108" y="130" width="16" height="10" rx="2" fill="#1a2030" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
  <text x="116" y="138" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,212,255,0.5)" text-anchor="middle">FEED</text>

  <!-- Element 3: Dir 1 -->
  <rect x="193" y="57" width="7" height="86" rx="2" fill="url(#el_fx)"/>
  <text x="197" y="44" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">D1</text>
  <text x="197" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">~90</text>

  <!-- Element 4: Dir 2 -->
  <rect x="280" y="61" width="7" height="78" rx="2" fill="url(#el_fx)"/>
  <text x="284" y="44" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">D2</text>
  <text x="284" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">~84</text>

  <!-- Element 5: Dir 3 -->
  <rect x="367" y="65" width="7" height="70" rx="2" fill="url(#el_fx)"/>
  <text x="371" y="44" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">D3</text>
  <text x="371" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">~80</text>

  <!-- Element 6: Dir 4 (shortest, front) -->
  <rect x="451" y="69" width="7" height="62" rx="2" fill="url(#el_fx)"/>
  <text x="455" y="44" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">D4</text>
  <text x="455" y="170" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle">~76</text>

  <!-- Direction arrow -->
  <line x1="460" y1="185" x2="500" y2="185" stroke="rgba(0,212,255,0.5)" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(0,212,255,0.6)"/>
    </marker>
  </defs>
  <text x="480" y="197" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.5)" text-anchor="middle">DX</text>

  <!-- Beam pattern hint (radiation lobe) -->
  <ellipse cx="490" cy="100" rx="22" ry="40" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="260" y="190" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,255,255,0.18)" text-anchor="middle">← 215 cm BOOM →        VERTICAL POL. · 144 MHz</text>
</svg>
