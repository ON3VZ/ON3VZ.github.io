<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 180" width="460" height="180">
  <defs>
    <linearGradient id="body2980" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252830"/>
      <stop offset="40%" stop-color="#1a1c24"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </linearGradient>
    <radialGradient id="vfo2980" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#5a5e6a"/>
      <stop offset="50%" stop-color="#282b36"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </radialGradient>
    <radialGradient id="knob2980" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#454858"/>
      <stop offset="100%" stop-color="#1a1c24"/>
    </radialGradient>
    <linearGradient id="screen2980" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001520"/>
      <stop offset="100%" stop-color="#000810"/>
    </linearGradient>
    <filter id="shadow2980">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="glow2980">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Speaker radial -->
    <radialGradient id="spkr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1c24"/>
      <stop offset="100%" stop-color="#0c0e14"/>
    </radialGradient>
    <!-- Yaesu blue accent -->
    <linearGradient id="yaesuStripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0044aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="8" y="12" width="444" height="158" rx="10" fill="rgba(0,0,0,0.5)" filter="url(#shadow2980)"/>

  <!-- Body -->
  <rect x="5" y="8" width="450" height="160" rx="9" fill="url(#body2980)"/>
  <!-- Top highlight -->
  <rect x="5" y="8" width="450" height="2.5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <!-- Left highlight -->
  <rect x="5" y="8" width="2.5" height="160" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Bottom shadow -->
  <rect x="5" y="164" width="450" height="4" rx="2" fill="rgba(0,0,0,0.4)"/>

  <!-- Yaesu accent stripe on front panel -->
  <rect x="13" y="8" width="6" height="160" rx="3" fill="url(#yaesuStripe)"/>

  <!-- ═══ DISPLAY ═══ -->
  <rect x="22" y="18" width="200" height="100" rx="5" fill="#080a10" stroke="rgba(0,212,255,0.25)" stroke-width="1.5"/>
  <rect x="24" y="20" width="196" height="96" rx="4" fill="url(#screen2980)"/>

  <!-- Frequency display main -->
  <text x="35" y="55" font-family="'Share Tech Mono',monospace" font-size="26" font-weight="700" fill="#00d4ff" filter="url(#glow2980)" letter-spacing="2">144.800</text>
  <text x="35" y="70" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(0,212,255,0.5)">MHz    FM  80W</text>

  <!-- Signal bar -->
  <rect x="30" y="78" width="120" height="5" rx="2" fill="#00111a"/>
  <rect x="30" y="78" width="72" height="5" rx="2" fill="#00d4ff" opacity="0.7"/>
  <rect x="30" y="78" width="38" height="5" rx="2" fill="#00eeff" opacity="0.9"/>
  <text x="30" y="92" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.35)">S 1 3 5 7 9</text>
  <!-- RX indicator -->
  <rect x="168" y="80" width="22" height="10" rx="2" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.4)" stroke-width="0.8"/>
  <text x="179" y="88" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.7)" text-anchor="middle">RX</text>

  <!-- Sub-freq row -->
  <text x="35" y="108" font-family="'Share Tech Mono',monospace" font-size="11" fill="rgba(0,212,255,0.4)" letter-spacing="1">431.000 MHz</text>

  <!-- ═══ SPEAKER GRILLE ═══ -->
  <!-- Speaker housing -->
  <rect x="230" y="18" width="120" height="100" rx="5" fill="url(#spkr)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Speaker mesh pattern -->
  <g fill="none" stroke="rgba(0,0,0,0.8)" stroke-width="0.5">
    <circle cx="290" cy="68" r="38" fill="rgba(0,0,0,0.4)"/>
    <circle cx="290" cy="68" r="30" fill="rgba(0,0,0,0.3)"/>
  </g>
  <!-- Speaker dots grid -->
  <g fill="rgba(0,0,0,0.7)">
    <!-- Row pattern of dots -->
    <rect x="235" y="23" width="2" height="2" rx="0.5"/><rect x="240" y="23" width="2" height="2" rx="0.5"/><rect x="245" y="23" width="2" height="2" rx="0.5"/><rect x="250" y="23" width="2" height="2" rx="0.5"/><rect x="255" y="23" width="2" height="2" rx="0.5"/><rect x="260" y="23" width="2" height="2" rx="0.5"/><rect x="265" y="23" width="2" height="2" rx="0.5"/><rect x="270" y="23" width="2" height="2" rx="0.5"/><rect x="275" y="23" width="2" height="2" rx="0.5"/><rect x="280" y="23" width="2" height="2" rx="0.5"/><rect x="285" y="23" width="2" height="2" rx="0.5"/><rect x="290" y="23" width="2" height="2" rx="0.5"/><rect x="295" y="23" width="2" height="2" rx="0.5"/><rect x="300" y="23" width="2" height="2" rx="0.5"/><rect x="305" y="23" width="2" height="2" rx="0.5"/><rect x="310" y="23" width="2" height="2" rx="0.5"/><rect x="315" y="23" width="2" height="2" rx="0.5"/><rect x="320" y="23" width="2" height="2" rx="0.5"/><rect x="325" y="23" width="2" height="2" rx="0.5"/><rect x="330" y="23" width="2" height="2" rx="0.5"/><rect x="335" y="23" width="2" height="2" rx="0.5"/><rect x="340" y="23" width="2" height="2" rx="0.5"/><rect x="345" y="23" width="2" height="2" rx="0.5"/>
    <rect x="235" y="28" width="2" height="2" rx="0.5"/><rect x="240" y="28" width="2" height="2" rx="0.5"/><rect x="245" y="28" width="2" height="2" rx="0.5"/><rect x="250" y="28" width="2" height="2" rx="0.5"/><rect x="255" y="28" width="2" height="2" rx="0.5"/><rect x="260" y="28" width="2" height="2" rx="0.5"/><rect x="265" y="28" width="2" height="2" rx="0.5"/><rect x="270" y="28" width="2" height="2" rx="0.5"/><rect x="275" y="28" width="2" height="2" rx="0.5"/><rect x="280" y="28" width="2" height="2" rx="0.5"/><rect x="285" y="28" width="2" height="2" rx="0.5"/><rect x="290" y="28" width="2" height="2" rx="0.5"/><rect x="295" y="28" width="2" height="2" rx="0.5"/><rect x="300" y="28" width="2" height="2" rx="0.5"/><rect x="305" y="28" width="2" height="2" rx="0.5"/><rect x="310" y="28" width="2" height="2" rx="0.5"/><rect x="315" y="28" width="2" height="2" rx="0.5"/><rect x="320" y="28" width="2" height="2" rx="0.5"/><rect x="325" y="28" width="2" height="2" rx="0.5"/><rect x="330" y="28" width="2" height="2" rx="0.5"/><rect x="335" y="28" width="2" height="2" rx="0.5"/><rect x="340" y="28" width="2" height="2" rx="0.5"/><rect x="345" y="28" width="2" height="2" rx="0.5"/>
  </g>
  <!-- Speaker circle cone -->
  <circle cx="290" cy="68" r="42" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="290" cy="68" r="28" fill="#111318" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="290" cy="68" r="12" fill="#0a0c10" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="290" cy="68" r="4" fill="#060608"/>

  <!-- ═══ RIGHT CONTROLS ═══ -->
  <!-- VFO Main Knob -->
  <circle cx="388" cy="60" r="36" fill="rgba(0,0,0,0.45)" filter="url(#shadow2980)"/>
  <circle cx="388" cy="60" r="33" fill="url(#vfo2980)"/>
  <circle cx="388" cy="60" r="33" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Tick marks -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
    <line x1="388" y1="29" x2="388" y2="36"/>
    <line x1="388" y1="84" x2="388" y2="91"/>
    <line x1="357" y1="60" x2="364" y2="60"/>
    <line x1="412" y1="60" x2="419" y2="60"/>
    <line x1="366" y1="38" x2="371" y2="43"/>
    <line x1="405" y1="38" x2="410" y2="43"/>
    <line x1="366" y1="77" x2="371" y2="72"/>
    <line x1="405" y1="77" x2="410" y2="72"/>
  </g>
  <circle cx="388" cy="60" r="24" fill="#1e2230" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="388" cy="60" r="16" fill="#252835"/>
  <line x1="388" y1="38" x2="388" y2="48" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow2980)"/>
  <circle cx="388" cy="37" r="2.5" fill="#00d4ff" filter="url(#glow2980)"/>
  <text x="388" y="103" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.3)" text-anchor="middle">VFO</text>

  <!-- Small controls right side -->
  <!-- Squelch knob -->
  <circle cx="440" cy="38" r="12" fill="rgba(0,0,0,0.35)"/>
  <circle cx="440" cy="38" r="10" fill="url(#knob2980)"/>
  <line x1="440" y1="29" x2="440" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="440" y="56" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">SQL</text>

  <!-- Volume knob -->
  <circle cx="440" cy="78" r="12" fill="rgba(0,0,0,0.35)"/>
  <circle cx="440" cy="78" r="10" fill="url(#knob2980)"/>
  <line x1="440" y1="69" x2="440" y2="74" stroke="rgba(0,212,255,0.5)" stroke-width="1.5"/>
  <text x="440" y="97" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">VOL</text>

  <!-- ═══ BOTTOM BUTTON ROW ═══ -->
  <rect x="22" y="128" width="410" height="32" rx="4" fill="rgba(0,0,0,0.15)"/>

  <!-- Function buttons -->
  <rect x="28" y="133" width="32" height="14" rx="2.5" fill="#151820" stroke="rgba(0,212,255,0.35)" stroke-width="0.8"/>
  <text x="44" y="142" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.65)" text-anchor="middle">BAND</text>

  <rect x="65" y="133" width="32" height="14" rx="2.5" fill="#151820" stroke="rgba(0,212,255,0.25)" stroke-width="0.8"/>
  <text x="81" y="142" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.5)" text-anchor="middle">STEP</text>

  <rect x="102" y="133" width="32" height="14" rx="2.5" fill="#151820" stroke="rgba(0,212,255,0.25)" stroke-width="0.8"/>
  <text x="118" y="142" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.5)" text-anchor="middle">SCAN</text>

  <rect x="139" y="133" width="28" height="14" rx="2.5" fill="#151820" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="153" y="142" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,255,136,0.55)" text-anchor="middle">MR</text>

  <rect x="172" y="133" width="28" height="14" rx="2.5" fill="#151820" stroke="rgba(0,255,136,0.25)" stroke-width="0.8"/>
  <text x="186" y="142" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,255,136,0.5)" text-anchor="middle">MW</text>

  <!-- TX/BUSY LED -->
  <circle cx="350" cy="138" r="5" fill="rgba(0,255,136,0.12)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="350" y="153" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,255,136,0.35)" text-anchor="middle">BUSY</text>

  <circle cx="370" cy="138" r="5" fill="rgba(255,68,102,0.08)" stroke="rgba(255,68,102,0.2)" stroke-width="1"/>
  <text x="370" y="153" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,68,102,0.35)" text-anchor="middle">TX</text>

  <!-- Power button -->
  <circle cx="415" cy="137" r="9" fill="#1a1c24" stroke="rgba(0,255,136,0.45)" stroke-width="1.5"/>
  <text x="415" y="141" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,255,136,0.8)" text-anchor="middle">⏻</text>

  <!-- ═══ LABEL ═══ -->
  <text x="22" y="158" font-family="'Orbitron',monospace" font-size="11" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="1">FT-2980E</text>
  <text x="150" y="158" font-family="'Share Tech Mono',monospace" font-size="7.5" fill="rgba(0,212,255,0.45)" letter-spacing="2">YAESU · 80W · 2m VHF · ALWAYS ON</text>

  <!-- Yaesu logo -->
  <text x="447" y="17" font-family="'Orbitron',monospace" font-size="8" fill="rgba(0,212,255,0.2)" text-anchor="end">YAESU</text>

  <!-- Mic connector bottom left -->
  <rect x="22" y="163" width="30" height="10" rx="2" fill="#0e1018" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="37" y="171" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.25)" text-anchor="middle">MIC</text>

  <!-- ANT -->
  <circle cx="88" cy="168" r="5" fill="#1e2030" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="88" cy="168" r="2" fill="#0a0c10"/>
  <text x="88" y="177" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.2)" text-anchor="middle">ANT</text>
</svg>
