<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 380" width="200" height="380">
  <defs>
    <linearGradient id="bodyFT65" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2c35"/>
      <stop offset="50%" stop-color="#1c1e28"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </linearGradient>
    <linearGradient id="screenFT65" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001528"/>
      <stop offset="100%" stop-color="#000812"/>
    </linearGradient>
    <radialGradient id="btnRd" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#cc2244"/>
      <stop offset="100%" stop-color="#880022"/>
    </radialGradient>
    <radialGradient id="btnGn" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00dd66"/>
      <stop offset="100%" stop-color="#008844"/>
    </radialGradient>
    <radialGradient id="keyBtn" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3a3c48"/>
      <stop offset="100%" stop-color="#1a1c24"/>
    </radialGradient>
    <linearGradient id="antenna" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3c45"/>
      <stop offset="50%" stop-color="#555868"/>
      <stop offset="100%" stop-color="#2a2c35"/>
    </linearGradient>
    <filter id="shadowFT65">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="glowFT65">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="volKnob" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#555868"/>
      <stop offset="50%" stop-color="#282a36"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </radialGradient>
    <!-- Rubber grip texture -->
    <linearGradient id="rubberGrip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#161820"/>
      <stop offset="50%" stop-color="#1e2028"/>
      <stop offset="100%" stop-color="#161820"/>
    </linearGradient>
    <!-- Yaesu blue stripe -->
    <linearGradient id="yaesuFT65" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066dd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0033aa" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="18" y="8" width="168" height="364" rx="16" fill="rgba(0,0,0,0.55)" filter="url(#shadowFT65)"/>

  <!-- ═══ ANTENNA ═══ -->
  <!-- Rubber flex section -->
  <rect x="74" y="2" width="16" height="30" rx="4" fill="url(#antenna)"/>
  <rect x="74" y="2" width="16" height="30" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Antenna sections -->
  <rect x="79" y="0" width="6" height="8" rx="1" fill="#3a3c45"/>
  <rect x="80" y="8" width="4.5" height="100" rx="1" fill="url(#antenna)"/>
  <rect x="80" y="8" width="4.5" height="100" rx="1" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <!-- Antenna tip -->
  <rect x="81" y="0" width="2.5" height="6" rx="0.5" fill="#555868"/>

  <!-- ═══ MAIN BODY ═══ -->
  <rect x="14" y="28" width="172" height="348" rx="14" fill="url(#bodyFT65)"/>
  <!-- Left highlight -->
  <rect x="14" y="28" width="3" height="348" rx="2" fill="rgba(255,255,255,0.05)"/>
  <!-- Right shadow -->
  <rect x="183" y="28" width="3" height="348" rx="2" fill="rgba(0,0,0,0.3)"/>
  <!-- Top highlight -->
  <rect x="14" y="28" width="172" height="2.5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <!-- Bottom shadow -->
  <rect x="14" y="371" width="172" height="5" rx="3" fill="rgba(0,0,0,0.4)"/>

  <!-- Yaesu blue stripe left side -->
  <rect x="14" y="60" width="6" height="200" rx="3" fill="url(#yaesuFT65)"/>

  <!-- ═══ SPEAKER GRILL (top) ═══ -->
  <rect x="60" y="36" width="80" height="28" rx="5" fill="#0e1018" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Speaker dots -->
  <g fill="rgba(0,0,0,0.75)">
    <rect x="64" y="40" width="2" height="2" rx="0.5"/><rect x="69" y="40" width="2" height="2" rx="0.5"/><rect x="74" y="40" width="2" height="2" rx="0.5"/><rect x="79" y="40" width="2" height="2" rx="0.5"/><rect x="84" y="40" width="2" height="2" rx="0.5"/><rect x="89" y="40" width="2" height="2" rx="0.5"/><rect x="94" y="40" width="2" height="2" rx="0.5"/><rect x="99" y="40" width="2" height="2" rx="0.5"/><rect x="104" y="40" width="2" height="2" rx="0.5"/><rect x="109" y="40" width="2" height="2" rx="0.5"/><rect x="114" y="40" width="2" height="2" rx="0.5"/><rect x="119" y="40" width="2" height="2" rx="0.5"/><rect x="124" y="40" width="2" height="2" rx="0.5"/><rect x="129" y="40" width="2" height="2" rx="0.5"/><rect x="134" y="40" width="2" height="2" rx="0.5"/>
    <rect x="64" y="46" width="2" height="2" rx="0.5"/><rect x="69" y="46" width="2" height="2" rx="0.5"/><rect x="74" y="46" width="2" height="2" rx="0.5"/><rect x="79" y="46" width="2" height="2" rx="0.5"/><rect x="84" y="46" width="2" height="2" rx="0.5"/><rect x="89" y="46" width="2" height="2" rx="0.5"/><rect x="94" y="46" width="2" height="2" rx="0.5"/><rect x="99" y="46" width="2" height="2" rx="0.5"/><rect x="104" y="46" width="2" height="2" rx="0.5"/><rect x="109" y="46" width="2" height="2" rx="0.5"/><rect x="114" y="46" width="2" height="2" rx="0.5"/><rect x="119" y="46" width="2" height="2" rx="0.5"/><rect x="124" y="46" width="2" height="2" rx="0.5"/><rect x="129" y="46" width="2" height="2" rx="0.5"/><rect x="134" y="46" width="2" height="2" rx="0.5"/>
    <rect x="64" y="52" width="2" height="2" rx="0.5"/><rect x="69" y="52" width="2" height="2" rx="0.5"/><rect x="74" y="52" width="2" height="2" rx="0.5"/><rect x="79" y="52" width="2" height="2" rx="0.5"/><rect x="84" y="52" width="2" height="2" rx="0.5"/><rect x="89" y="52" width="2" height="2" rx="0.5"/><rect x="94" y="52" width="2" height="2" rx="0.5"/><rect x="99" y="52" width="2" height="2" rx="0.5"/><rect x="104" y="52" width="2" height="2" rx="0.5"/><rect x="109" y="52" width="2" height="2" rx="0.5"/><rect x="114" y="52" width="2" height="2" rx="0.5"/><rect x="119" y="52" width="2" height="2" rx="0.5"/><rect x="124" y="52" width="2" height="2" rx="0.5"/><rect x="129" y="52" width="2" height="2" rx="0.5"/><rect x="134" y="52" width="2" height="2" rx="0.5"/>
  </g>

  <!-- ═══ VOL/SQL top knobs ═══ -->
  <!-- Vol -->
  <circle cx="40" cy="50" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="40" cy="50" r="12" fill="url(#volKnob)"/>
  <circle cx="40" cy="50" r="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <line x1="40" y1="39" x2="40" y2="43"/>
    <line x1="40" y1="57" x2="40" y2="61"/>
    <line x1="29" y1="50" x2="33" y2="50"/>
    <line x1="47" y1="50" x2="51" y2="50"/>
  </g>
  <circle cx="40" cy="50" r="7" fill="#1e2030"/>
  <line x1="40" y1="43" x2="40" y2="47" stroke="rgba(0,212,255,0.6)" stroke-width="2"/>
  <text x="40" y="70" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.25)" text-anchor="middle">VOL</text>

  <!-- SQL -->
  <circle cx="160" cy="50" r="14" fill="rgba(0,0,0,0.4)"/>
  <circle cx="160" cy="50" r="12" fill="url(#volKnob)"/>
  <circle cx="160" cy="50" r="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <line x1="160" y1="39" x2="160" y2="43"/>
    <line x1="160" y1="57" x2="160" y2="61"/>
    <line x1="149" y1="50" x2="153" y2="50"/>
    <line x1="167" y1="50" x2="171" y2="50"/>
  </g>
  <circle cx="160" cy="50" r="7" fill="#1e2030"/>
  <line x1="160" y1="43" x2="160" y2="47" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <text x="160" y="70" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(255,255,255,0.25)" text-anchor="middle">SQL</text>

  <!-- ═══ LCD DISPLAY ═══ -->
  <rect x="24" y="72" width="152" height="82" rx="5" fill="#060810" stroke="rgba(0,212,255,0.28)" stroke-width="1.5"/>
  <rect x="26" y="74" width="148" height="78" rx="4" fill="url(#screenFT65)"/>

  <!-- Main freq -->
  <text x="32" y="98" font-family="'Share Tech Mono',monospace" font-size="20" font-weight="700" fill="#00d4ff" filter="url(#glowFT65)" letter-spacing="1">144.800</text>
  <text x="32" y="110" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(0,212,255,0.45)">A  FM  5W</text>
  <!-- S-meter -->
  <rect x="32" y="115" width="90" height="4" rx="1.5" fill="#001018"/>
  <rect x="32" y="115" width="55" height="4" rx="1.5" fill="#00d4ff" opacity="0.7"/>
  <rect x="32" y="115" width="28" height="4" rx="1.5" fill="#00eeff" opacity="0.9"/>
  <!-- Sub band -->
  <text x="32" y="133" font-family="'Share Tech Mono',monospace" font-size="11" fill="rgba(0,212,255,0.35)" letter-spacing="0.5">430.000</text>
  <text x="32" y="143" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,212,255,0.25)">B  FM</text>

  <!-- RX indicator -->
  <rect x="144" y="77" width="22" height="10" rx="2" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.35)" stroke-width="0.8"/>
  <text x="155" y="84" font-family="'Share Tech Mono',monospace" font-size="5.5" fill="rgba(0,212,255,0.6)" text-anchor="middle">RX</text>

  <!-- ═══ KEY BUTTONS GRID ═══ -->
  <!-- PTT - side implied by position indicator -->
  <!-- Row 1 -->
  <g>
    <!-- A/B -->
    <rect x="26" y="162" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="46" y="176" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">A/B</text>

    <!-- BAND -->
    <rect x="72" y="162" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="92" y="176" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(0,212,255,0.6)" text-anchor="middle">BAND</text>

    <!-- PRIO -->
    <rect x="118" y="162" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="138" y="176" font-family="'Share Tech Mono',monospace" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">PRIO</text>
  </g>

  <!-- Row 2 - numerics 1 2 3 -->
  <g>
    <rect x="26" y="192" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="46" y="207" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">1</text>
    <text x="46" y="213" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(0,212,255,0.35)" text-anchor="middle">VFO/MR</text>

    <rect x="72" y="192" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="92" y="207" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">2</text>
    <text x="92" y="213" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(0,212,255,0.35)" text-anchor="middle">HM CH</text>

    <rect x="118" y="192" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="138" y="207" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">3</text>
    <text x="138" y="213" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(0,212,255,0.35)" text-anchor="middle">SCAN</text>
  </g>

  <!-- Row 3 - 4 5 6 -->
  <g>
    <rect x="26" y="222" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="46" y="237" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">4</text>

    <rect x="72" y="222" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="92" y="237" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">5</text>

    <rect x="118" y="222" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="138" y="237" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">6</text>
  </g>

  <!-- Row 4 - 7 8 9 -->
  <g>
    <rect x="26" y="252" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="46" y="267" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">7</text>

    <rect x="72" y="252" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="92" y="267" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">8</text>

    <rect x="118" y="252" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="138" y="267" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">9</text>
  </g>

  <!-- Row 5 - * 0 # -->
  <g>
    <rect x="26" y="282" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,68,102,0.3)" stroke-width="1"/>
    <text x="46" y="296" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(255,68,102,0.7)" text-anchor="middle">CLR</text>

    <rect x="72" y="282" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="92" y="296" font-family="'Share Tech Mono',monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">0</text>

    <rect x="118" y="282" width="40" height="22" rx="4" fill="url(#keyBtn)" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
    <text x="138" y="296" font-family="'Share Tech Mono',monospace" font-size="7" fill="rgba(0,255,136,0.6)" text-anchor="middle">ENT</text>
  </g>

  <!-- ═══ BOTTOM LARGE BUTTONS ═══ -->
  <!-- MONI/POWER -->
  <rect x="26" y="318" width="60" height="26" rx="5" fill="url(#btnRd)"/>
  <text x="56" y="333" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="700">PWR</text>

  <!-- TX/PTT indicator (side) -->
  <rect x="166" y="155" width="12" height="45" rx="4" fill="#cc2244" filter="url(#glowFT65)"/>
  <text x="172" y="180" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(255,255,255,0.8)" text-anchor="middle" transform="rotate(-90,172,178)">PTT</text>

  <!-- LAMP button -->
  <rect x="100" y="318" width="74" height="26" rx="5" fill="url(#keyBtn)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="137" y="333" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(0,212,255,0.7)" text-anchor="middle">FUNC</text>

  <!-- ═══ CHARGING PORT / INDICATOR ═══ -->
  <rect x="82" y="358" width="36" height="10" rx="3" fill="#0e1018" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="100" y="365" font-family="'Share Tech Mono',monospace" font-size="5" fill="rgba(255,255,255,0.2)" text-anchor="middle">USB-C</text>

  <!-- TX LED -->
  <circle cx="166" cy="90" r="3.5" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>

  <!-- ═══ LABEL ═══ -->
  <text x="100" y="350" font-family="'Orbitron',monospace" font-size="8" font-weight="700" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">FT-65</text>
  <text x="100" y="358" font-family="'Share Tech Mono',monospace" font-size="6" fill="rgba(0,212,255,0.35)" text-anchor="middle">YAESU · 5W · 2m/70cm</text>

  <!-- YAESU watermark right side -->
  <text x="182" y="240" font-family="'Orbitron',monospace" font-size="8" fill="rgba(0,212,255,0.1)" text-anchor="middle" transform="rotate(90,182,240)">YAESU</text>
</svg>
