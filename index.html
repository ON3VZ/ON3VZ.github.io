<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>ON3KRB — Oscar November 3 Kilo Romeo Bravo</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="overflow:hidden;">
  <div class="radial-glow"></div>
  <div class="stage">
    <div class="callsign-hero">ON3KRB</div>
    <div class="phonetic-line">Oscar November 3 Kilo Romeo Bravo</div>

    <div class="morse-chars" id="morseChars">
      </div>

    <div class="controls">
      <button class="btn-play" id="playBtn" onclick="startMorse()">▶ SPEEL</button>
      <button class="btn-play" id="stopBtn" onclick="stopMorse()" disabled>■ STOP</button>
    </div>

    <a class="enter-btn" href="/inner.html">ENTER SITE →</a>
  </div>

  <script>
    const CALL = "ON3KRB";
    const MORSE = { 'O': '---', 'N': '-.', '3': '...--', 'K': '-.-', 'R': '.-.', 'B': '-...' };
    
    // Logica voor accentuering van karakters
    function initMorse() {
      const container = document.getElementById('morseChars');
      CALL.split('').forEach((char, i) => {
        const div = document.createElement('div');
        div.className = 'mc';
        div.id = `mc-${i}`;
        div.innerHTML = `<div class="mc-char">${char}</div><div class="mc-code">${MORSE[char]}</div>`;
        container.appendChild(div);
      });
    }
    
    // Hier komt de startMorse/stopMorse logica die de 'active' class toevoegt aan mc-${i}
    initMorse();
  </script>
</body>
</html>
